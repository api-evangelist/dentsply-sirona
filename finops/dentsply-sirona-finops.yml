specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Dentsply Sirona
providerId: dentsply-sirona
publisherName: Dentsply Sirona, Inc.
serviceCategory: Dental Technology / Practice Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dentsply Sirona does not publish API pricing. DS Core is sold as a per-practice subscription, with
  imaging-modality APIs included with hardware purchase. FinOps shape is SaaS subscription plus hardware
  CapEx; API consumption is not directly billed. Reconcile against DS Core subscription invoices when available.
tags:
  - Dental
  - DS Core
  - Practice Management
  - Imaging
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Dentsply Sirona DS Core and intraoral imaging APIs: SaaS subscription
  for the DS Core cloud platform plus modality-bundled API access on hardware. No per-call API charges.'
sources:
  - https://www.dentsplysirona.com/
  - https://developer.dscore.com/
principles:
  - name: Visibility
    description: Track DS Core seat and practice counts via the practice admin console; reconcile imaging
      storage and partner-app entitlements against the DS Core subscription terms.
  - name: Allocation
    description: Allocate DS Core spend by practice location and modality (CEREC, Primescan, Schick) for
      multi-site dental groups; tag partner-app installs to the practice that activated them.
  - name: Optimization
    description: Right-size DS Core seat counts during quarterly reviews, archive old imaging studies
      to manage storage, and consolidate partner-app subscriptions to avoid double-paying for overlapping
      capabilities.
  - name: Accountability
    description: Practice owner / DSO operations leader owns DS Core renewal and seat hygiene; integration
      partners own usage of their respective DS Core APIs.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: SaaS Subscription + Hardware Bundle
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
