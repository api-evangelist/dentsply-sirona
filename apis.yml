apis:
  - aid: dentsply-sirona:ds-core-api
    name: DS Core API
    description: >-
      DS Core is the open cloud platform from Dentsply Sirona that connects dental
      practices, laboratories, and DSOs through a single web-based experience. The
      DS Core API enables Practice Management System (PMS) providers, Lab Management
      System (LMS) providers, and DSO enterprise solutions to integrate with DS Core
      for patient data synchronization, scan and imaging exchange, lab order routing,
      file and comment exchange, and Single Sign-On user provisioning.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://open.dscore.com/
    baseURL: https://api.dscore.com
    tags:
      - DS Core
      - Imaging
      - Lab Management
      - Patient Data
      - Practice Management
      - SSO
    properties:
      - type: Documentation
        url: https://open.dscore.com/
      - type: SignUp
        url: https://open.dscore.com/
      - type: Marketing
        url: https://www.dentsplysirona.com/en/lp/connected-dentistry.html
    contact:
      - FN: DS Core Open Platform
        url: https://open.dscore.com/
  - aid: dentsply-sirona:dsio-modality-api
    name: Dentsply Sirona Intraoral Imaging Modality API
    description: >-
      The DSIO modality API enables third-party imaging software to drive
      Dentsply Sirona intraoral imaging hardware (sensors and cameras) through
      a documented protocol. The API and its reference client are published on
      GitHub by the Dentsply Sirona Imaging team and are intended for software
      vendors that wish to capture, transfer, and store intraoral images from
      Dentsply Sirona devices in their own dental software.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/dsimaging/dsio-modality-api
    baseURL: https://api.example.com
    tags:
      - GitHub
      - Imaging
      - Intraoral
      - Modality
      - Sensors
    properties:
      - type: Documentation
        url: https://github.com/dsimaging/dsio-modality-api
      - type: Source Code
        url: https://github.com/dsimaging/dsio-modality-api
    contact:
      - FN: Dentsply Sirona Imaging
        url: https://github.com/dsimaging
