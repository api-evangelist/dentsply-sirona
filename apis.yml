aid: dentsply-sirona
name: Dentsply Sirona
description: >-
  Dentsply Sirona is the world's largest manufacturer of professional dental
  products and technologies, providing comprehensive solutions for dentists,
  dental laboratories, and dental specialists worldwide. The company exposes
  developer integrations through DS Core, an open cloud platform, and through
  the Dentsply Sirona Imaging modality API for intraoral imaging hardware.
