specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Dentsply Sirona
providerId: dentsply-sirona
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dentsply Sirona does not publish self-serve API pricing. DS Core (cloud platform) and Intraoral
  Imaging Modality APIs are accessed by accredited practice / lab software partners and existing DS Core
  customers; commercial terms are agreed via dental partner agreements. No public per-call API price exists.
tags:
  - CAD/CAM
  - CEREC
  - Dental
  - DS Core
  - Imaging
  - Intraoral Imaging
  - Lab Management
  - Practice Management
description: Dentsply Sirona DS Core APIs are gated to integration partners and DS Core subscribers rather
  than self-serve. API access is bundled with the DS Core cloud subscription (per-practice / per-seat
  pricing not published) or with the corresponding hardware modality (CEREC, Primescan, Schick). Custom
  pricing terms are described in the partner agreement; this artifact retains a single bundled plan stub
  pending direct partner reconciliation.
sources:
  - https://www.dentsplysirona.com/
  - https://developer.dscore.com/
plans:
  - id: dentsply-sirona-ds-core-bundled
    name: DS Core / Modality-Bundled Access
    type: enterprise
    description: API access is bundled with a DS Core subscription or with the underlying intraoral imaging
      modality. Pricing is bilateral and not published publicly.
    entries:
      - label: DS Core Subscription
        description: Practice / lab subscription to DS Core cloud platform; pricing custom.
        name: ds_core_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        domains:
          - https://api.dscore.com
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Modality / Hardware Bundle
        description: Intraoral Imaging Modality API bundled with the corresponding Schick / Primescan
          / CEREC modality.
        name: modality_bundle
        type: flat
        metric: device
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://api.dscore.com
        unit: 1
        price: included with hardware
        userMultiplied: false
      - label: Partner API Access
        description: ISV / partner API access under the DS Core developer agreement.
        name: partner_api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://api.dscore.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: DS Core API
      - name: Dentsply Sirona Intraoral Imaging Modality API
      - name: Partner agreement terms
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
