specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dentsply Sirona
providerId: dentsply-sirona
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dentsply Sirona does not publish a public rate-limit table for the DS Core or Intraoral Imaging
  Modality APIs. Limits are coordinated with integration partners during the DS Core developer onboarding.
  Headers and response codes below are scaffold defaults pending direct doc reconciliation.
tags:
  - Dental
  - DS Core
  - Imaging
  - Practice Management
  - Rate Limiting
description: Per-partner rate limits set during DS Core developer onboarding. Imaging-modality endpoints
  carry separate concurrency budgets aligned to upload throughput rather than RPS, since each scan or
  X-ray series is a multi-megabyte upload.
sources:
  - https://developer.dscore.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: partner
    name: Partner-Negotiated Limit
    scope: contract
    metric: varies
    limit: 'set per DS Core developer agreement'
    applies:
      - DS Core API
      - Dentsply Sirona Intraoral Imaging Modality API
policies:
  - name: Per-Partner Onboarding
    description: TPS, concurrent uploads, and daily quotas are agreed during DS Core developer onboarding.
  - name: Imaging Upload Backpressure
    description: Imaging endpoints throttle on concurrent multipart uploads rather than per-second request
      rate; clients should expect 429 / 503 when the upload pipeline saturates.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring Retry-After when present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
